<section class="container" style="padding: 3rem 0;">
  <div class="header-row">
    <div>
      <span class="pill">Application</span>
      <h2 class="title">Apply to this job</h2>
      <p class="text-muted">Submit your GitHub link and your CV (PDF only).</p>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" type="button" (click)="goBack()">← Back</button>
      <button class="btn btn-primary" type="button" [disabled]="submitting()" (click)="submit()">
        Submit
      </button>
    </div>
  </div>

  <article class="card" style="margin-top: 1.25rem;">
    <form [formGroup]="form" (ngSubmit)="submit()" style="display:grid; gap: 1rem;">

      <!-- GitHub URL (optional) -->
      <div>
        <label class="text-muted">
          GitHub link
          <span style="opacity:.5; margin-left:.25rem;">(optional)</span>
        </label>

        <div style="display:flex; gap:.5rem; margin-top:.35rem;">
          <input
            class="input"
            type="text"
            formControlName="githubUrl"
            placeholder="https://github.com/username"
            (input)="onGithubInput()"
            style="flex: 1;"
          />
          <button
            class="btn btn-ghost"
            type="button"
            [disabled]="!form.value.githubUrl?.trim() || githubChecking()"
            (click)="checkGithub()"
          >
            {{ githubChecking() ? 'Checking...' : 'Verify' }}
          </button>
        </div>

        <!-- Validation feedback -->
        <div style="margin-top:.35rem; font-size:13px; color: #16a34a;"
             *ngIf="githubValid() === true">
          ✓ Link is valid
        </div>
        <div style="margin-top:.35rem; font-size:13px; color: #dc2626;"
             *ngIf="githubValid() === false">
          ✗ Link is broken or unreachable
        </div>
        <div class="text-muted" style="margin-top:.35rem;"
             *ngIf="form.get('githubUrl')?.touched && form.get('githubUrl')?.invalid">
          Please enter a valid URL (must start with http:// or https://).
        </div>
      </div>

      <!-- CV Upload -->
      <div>
        <label class="text-muted">CV file (PDF only)</label>
        <input
          class="input"
          type="file"
          accept="application/pdf,.pdf"
          (change)="onFileChange($event)"
          style="margin-top:.35rem;"
        />
        <div class="text-muted" style="margin-top:.35rem;" *ngIf="cvName()">
          Selected: <span class="mono">{{ cvName() }}</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Footer actions -->
      <div style="display:flex; gap:.75rem; justify-content:flex-end; flex-wrap:wrap;">
        <button class="btn btn-ghost" type="button" (click)="goBack()">Cancel</button>
        <button
          class="btn btn-primary"
          type="submit"
          [disabled]="submitting() || form.invalid || !cvFile()"
        >
          {{ submitting() ? 'Submitting...' : 'Submit application' }}
        </button>
      </div>

      <!-- Status messages -->
      <div style="font-size:13px; color:#dc2626;" *ngIf="error()">{{ error() }}</div>
      <div style="font-size:13px; color:#16a34a;" *ngIf="success()">{{ success() }}</div>

    </form>
  </article>
</section>
